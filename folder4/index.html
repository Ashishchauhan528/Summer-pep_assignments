<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Counter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f4f4f4;
    }

    .card {
      background: white;
      padding: 24px 30px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    button {
      padding: 10px 16px;
      margin: 0 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
    }

    #increment {
      background: #28a745;
      color: white;
    }

    #decrement {
      background: #dc3545;
      color: white;
    }

    #counter {
      font-size: 32px;
      font-weight: bold;
      display: inline-block;
      min-width: 40px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Simple Counter</h2>
    <button id="decrement">-</button>
    <span id="counter">0</span>
    <button id="increment">+</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
